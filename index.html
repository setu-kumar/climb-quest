<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Climb Quest</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

<h2 class="sr-only" style="text-align: center;">Climb Quest — a side-scrolling climbing game.</h2>
<h3 class="sr-only" style="text-align: center;"> Reach the flag at the top to win.</h3>
<div style="display:flex; flex-direction:column; align-items:center; gap:8px; padding:0.5rem 0;">
  <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
    <div style="font-size:13px; color:var(--color-text-secondary);">Height: <span id="heightOut" style="font-weight:500; color:var(--color-text-primary);">0%</span></div>
    <div style="font-size:13px; color:var(--color-text-secondary);">Lives: <span id="livesOut" style="font-weight:500; color:var(--color-text-primary);">3</span></div>
    <button id="restartBtn" style="font-size:12px; padding:4px 8px;"><i class="ti ti-refresh" style="font-size:13px; vertical-align:-2px; margin-right:4px;" aria-hidden="true"></i>Restart</button>
  </div>
  <div style="position:relative; width:100%; border-radius:var(--border-radius-lg); overflow:hidden; border:0.5px solid var(--color-border-tertiary);">
    <canvas id="game" width="380" height="475" style="display:block; width:100%; height:auto; background:#bfe8f5; touch-action:none;"></canvas>
    <div id="overlay" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:rgba(0,0,0,0.45);">
      <div id="overlayTitle" style="font-size:18px; font-weight:500; color:#fff; text-align:center; padding:0 1rem;">You win!</div>
      <button id="overlayBtn" style="background:#fff; padding:7px 16px;">Play again</button>
    </div>
  </div>
  <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-top:4px;">
    <div style="display:flex; gap:8px;">
      <button id="btnLeft" aria-label="Move left" style="width:56px; height:56px; font-size:22px; display:flex; align-items:center; justify-content:center; user-select:none; touch-action:none;"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <button id="btnRight" aria-label="Move right" style="width:56px; height:56px; font-size:22px; display:flex; align-items:center; justify-content:center; user-select:none; touch-action:none;"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <button id="btnJump" aria-label="Jump" style="width:72px; height:56px; font-size:13px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:4px; user-select:none; touch-action:none;"><i class="ti ti-arrow-up" style="font-size:18px;" aria-hidden="true"></i>Jump</button>
  </div>
  <div style="font-size:11px; color:var(--color-text-tertiary); text-align:center;">
    
  </div>
</div>
<script>
(function(){
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W = 380, H = 475;

  var WORLD_H = 3300;
  var GROUND_Y = WORLD_H - 32;

  function rand(a,b){ return a + Math.random()*(b-a); }

  var platforms = [];
  platforms.push({x:0, y:GROUND_Y, w:380, h:32, type:'solid'});

  var y = GROUND_Y - 75;
  var lastX = 160;
  while (y > 180) {
    var w = rand(58,105);
    var x = Math.max(8, Math.min(380-w-8, lastX + rand(-130,130)));
    var moving = Math.random() < 0.18 && y < GROUND_Y - 470;
    var hazard = Math.random() < 0.12 && y < GROUND_Y - 320;
    platforms.push({
      x:x, y:y, w:w, h:13,
      type: moving ? 'moving' : 'solid',
      hazard: hazard,
      baseX:x, range: rand(32,70), speed: rand(0.45,1.0), dir:1
    });
    lastX = x + w/2;
    y -= rand(58,88);
  }
  var goalPlatform = platforms[platforms.length-1];
  var goal = {x: goalPlatform.x + goalPlatform.w/2 - 13, y: goalPlatform.y - 40, w:26, h:40};

  var checkpoints = [];
  for (var i=0;i<platforms.length;i+=Math.floor(platforms.length/4)||1){
    checkpoints.push(platforms[i]);
  }

  var player = {
    x: 175, y: GROUND_Y - 32, w:22, h:30,
    vx:0, vy:0, onGround:false, facing:1, squash:1
  };

  var keys = {};
  var touch = {left:false, right:false, jump:false};
  var lives = 3;
  var maxHeightReached = 0;
  var gameOver = false;
  var won = false;
  var lastCheckpoint = {x: 175, y: GROUND_Y - 32};

  var GRAVITY = 0.5;
  var MOVE_SPEED = 2.8;
  var JUMP_V = -10.4;
  var FRICTION = 0.82;

  function resetPlayerToCheckpoint(){
    player.x = lastCheckpoint.x;
    player.y = lastCheckpoint.y;
    player.vx = 0; player.vy = 0;
  }

  function fullRestart(){
    lives = 3;
    gameOver = false; won = false;
    lastCheckpoint = {x:175, y:GROUND_Y-32};
    resetPlayerToCheckpoint();
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('livesOut').textContent = lives;
  }

  document.addEventListener('keydown', function(e){
    var k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].indexOf(k) !== -1) e.preventDefault();
    keys[k] = true;
  });
  document.addEventListener('keyup', function(e){
    keys[e.key.toLowerCase()] = false;
  });

  function bindHold(el, onDown, onUp){
    el.addEventListener('touchstart', function(e){ e.preventDefault(); onDown(); }, {passive:false});
    el.addEventListener('touchend', function(e){ e.preventDefault(); onUp(); }, {passive:false});
    el.addEventListener('touchcancel', function(e){ e.preventDefault(); onUp(); }, {passive:false});
    el.addEventListener('mousedown', function(e){ e.preventDefault(); onDown(); });
    el.addEventListener('mouseup', function(e){ e.preventDefault(); onUp(); });
    el.addEventListener('mouseleave', function(e){ onUp(); });
  }
  bindHold(document.getElementById('btnLeft'), function(){touch.left=true;}, function(){touch.left=false;});
  bindHold(document.getElementById('btnRight'), function(){touch.right=true;}, function(){touch.right=false;});
  bindHold(document.getElementById('btnJump'), function(){touch.jump=true;}, function(){touch.jump=false;});

  document.getElementById('restartBtn').addEventListener('click', fullRestart);
  document.getElementById('overlayBtn').addEventListener('click', fullRestart);

  function update(){
    if (gameOver || won) return;

    for (var i=0;i<platforms.length;i++){
      var p = platforms[i];
      if (p.type === 'moving'){
        p.x += p.speed * p.dir;
        if (p.x > p.baseX + p.range || p.x < p.baseX - p.range) p.dir *= -1;
      }
    }

    var left = keys['a'] || keys['arrowleft'] || touch.left;
    var right = keys['d'] || keys['arrowright'] || touch.right;
    var jump = keys['w'] || keys['arrowup'] || keys[' '] || touch.jump;

    if (left){ player.vx -= 0.75; player.facing = -1; }
    if (right){ player.vx += 0.75; player.facing = 1; }
    player.vx *= FRICTION;
    if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
    if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;

    if (jump && player.onGround){
      player.vy = JUMP_V;
      player.onGround = false;
      player.squash = 1.3;
    }

    player.vy += GRAVITY;
    if (player.vy > 14) player.vy = 14;

    player.x += player.vx;
    player.y += player.vy;

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > W) player.x = W - player.w;

    player.onGround = false;
    for (var j=0;j<platforms.length;j++){
      var pl = platforms[j];
      var prevBottom = player.y + player.h - player.vy;
      var nowBottom = player.y + player.h;
      if (player.vy >= 0 &&
          prevBottom <= pl.y + 2 &&
          nowBottom >= pl.y &&
          player.x + player.w > pl.x + 3 &&
          player.x < pl.x + pl.w - 3){
        player.y = pl.y - player.h;
        player.vy = 0;
        player.onGround = true;
        if (pl.type === 'moving') player.x += pl.speed * pl.dir;
        if (pl.hazard){
          loseLife();
          return;
        }
        if (checkpoints.indexOf(pl) !== -1){
          lastCheckpoint = {x: player.x, y: pl.y - player.h};
        }
      }
    }

    if (player.squash > 1) player.squash -= 0.04;
    if (player.squash < 1) player.squash = 1;

    if (player.y > WORLD_H + 60){
      loseLife();
      return;
    }

    var heightPct = Math.max(0, Math.min(100, Math.round(((GROUND_Y - player.y) / (GROUND_Y - goal.y)) * 100)));
    maxHeightReached = Math.max(maxHeightReached, heightPct);
    document.getElementById('heightOut').textContent = maxHeightReached + '%';

    if (player.x + player.w > goal.x && player.x < goal.x + goal.w &&
        player.y + player.h > goal.y && player.y < goal.y + goal.h){
      won = true;
      document.getElementById('overlayTitle').innerHTML = '<i class="ti ti-trophy" style="font-size:22px; vertical-align:-5px; margin-right:6px;" aria-hidden="true"></i>You reached the top!';
      document.getElementById('overlay').style.display = 'flex';
    }
  }

  function loseLife(){
    lives -= 1;
    document.getElementById('livesOut').textContent = Math.max(0, lives);
    if (lives <= 0){
      gameOver = true;
      document.getElementById('overlayTitle').textContent = 'Out of lives — try again!';
      document.getElementById('overlay').style.display = 'flex';
    } else {
      resetPlayerToCheckpoint();
    }
  }

  function drawBackground(camY){
    ctx.fillStyle = '#bfe8f5';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (var c=0;c<5;c++){
      var cy = ((c*560 - camY*0.3) % (WORLD_H+300));
      if (cy < -150) cy += WORLD_H+300;
      var cx = (c*81) % W;
      ctx.beginPath();
      ctx.ellipse(cx, cy % H, 28,12,0,0,Math.PI*2);
      ctx.ellipse(cx+24, (cy%H)+5, 22,11,0,0,Math.PI*2);
      ctx.ellipse(cx-20, (cy%H)+6, 19,9,0,0,Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle = '#8fd99a';
    for (var m=0;m<4;m++){
      var mx = m*110 - 25;
      var mh = 70 + (m%3)*16;
      ctx.beginPath();
      ctx.moveTo(mx, H);
      ctx.lineTo(mx+50, H-mh);
      ctx.lineTo(mx+100, H);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawPlatform(p, sy){
    if (p.hazard){
      ctx.fillStyle = '#e24b4a';
      ctx.beginPath();
      var teeth = Math.max(2, Math.floor(p.w/13));
      ctx.moveTo(p.x, sy + p.h);
      for (var t=0;t<teeth;t++){
        var tx = p.x + (t+0.5)*(p.w/teeth);
        ctx.lineTo(tx, sy);
        ctx.lineTo(p.x + (t+1)*(p.w/teeth), sy + p.h);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = p.type === 'moving' ? '#f0997b' : '#5dcaa5';
      ctx.beginPath();
      ctx.roundRect(p.x, sy, p.w, p.h, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(p.x+3, sy+2, p.w-6, 2);
    }
  }

  function draw(){
    var camY = Math.max(0, Math.min(WORLD_H - H, player.y - H*0.55));

    drawBackground(camY);

    for (var i=0;i<platforms.length;i++){
      var p = platforms[i];
      var sy = p.y - camY;
      if (sy > -30 && sy < H+30){
        if (p === platforms[0]){
          ctx.fillStyle = '#639922';
          ctx.fillRect(p.x, sy, p.w, p.h);
          ctx.fillStyle = '#27500a';
          ctx.fillRect(p.x, sy, p.w, 5);
        } else {
          drawPlatform(p, sy);
        }
      }
    }

    var gsy = goal.y - camY;
    if (gsy > -50 && gsy < H+50){
      ctx.fillStyle = '#888780';
      ctx.fillRect(goal.x + goal.w/2 - 2, gsy, 4, goal.h);
      ctx.fillStyle = '#e24b4a';
      ctx.beginPath();
      ctx.moveTo(goal.x + goal.w/2 + 2, gsy);
      ctx.lineTo(goal.x + goal.w/2 + 20, gsy+6);
      ctx.lineTo(goal.x + goal.w/2 + 2, gsy+13);
      ctx.closePath();
      ctx.fill();
    }

    var psy = player.y - camY;
    var pcx = player.x + player.w/2;
    var pcy = psy + player.h/2;
    ctx.save();
    ctx.translate(pcx, pcy);
    ctx.scale(player.facing * (1/player.squash) , player.squash);
    ctx.fillStyle = '#534ab7';
    ctx.beginPath();
    ctx.roundRect(-player.w/2, -player.h/2, player.w, player.h, 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(4, -6, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#26215c';
    ctx.beginPath();
    ctx.arc(5, -6, 1.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

</body>
</html>
